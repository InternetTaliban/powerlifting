# Powerlifting Hub — example nginx server block.
#
# The app is a static client-side bundle: run `npm run build` and deploy the
# generated `dist/` folder. State lives only in each visitor's localStorage, so
# every visitor is served the same default build and anything they change stays on
# their own device. There is no backend, no database, no per-user server state —
# nothing to secure server-side except the static files themselves.
#
# Two ways to wire it up are shown below. Serving the files directly with nginx
# (Option A) is recommended: nginx has reliable MIME types, which matter because a
# service worker will refuse to register if sw.js is sent as text/plain.
#
# Copy this into /etc/nginx/sites-available/, edit server_name + the root/upstream,
# symlink into sites-enabled/, then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name benchapp.example.com;   # <-- your domain (or _ for any host)

    # --- Security headers (applied site-wide) -------------------------------------
    # These are add_header directives, so the cache rules below use `expires`
    # (not add_header) on purpose — that keeps these inherited into every location.
    # The Vite bundle ships no inline scripts, so script-src is locked to 'self'.
    # style-src keeps 'unsafe-inline' for the inline style attributes the app uses.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # Only enable HSTS once you are serving over HTTPS (see the TLS block at the
    # bottom). Sending it over plain HTTP is ignored by browsers anyway.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compression --------------------------------------------------------------
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # ============================ Option A: serve static (recommended) ============
    root /var/www/benchapp/dist;       # <-- the `npm run build` output
    index index.html;

    # The service worker and the app shell must always be revalidated so a new
    # deploy reaches visitors immediately. Workbox serves the precache offline.
    location = /sw.js {
        expires -1;                    # Cache-Control: no-cache
    }
    location = /index.html {
        expires -1;
    }
    location = / {
        expires -1;
    }
    location = /manifest.webmanifest {
        expires -1;
    }

    # Vite emits content-hashed filenames under /assets, so they can be cached
    # forever — a new build produces new names and the old ones simply fall out.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Single page: unknown paths fall back to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================ Option B: proxy to a local static server ========
    # If you would rather keep a localhost static server running (e.g.
    # `npm run preview`, which serves the built dist/ on :4173) and just put nginx
    # in front of it, delete Option A above and use:
    #
    #   location / {
    #       proxy_pass http://127.0.0.1:4173;
    #       proxy_set_header Host $host;
    #       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #       proxy_set_header X-Forwarded-Proto $scheme;
    #   }
    #   location = /sw.js {
    #       proxy_pass http://127.0.0.1:4173/sw.js;
    #       expires -1;
    #   }
    #
    # Note: whatever runs on :4173 must send sw.js with a JavaScript MIME type, and
    # should bind to 127.0.0.1 (not 0.0.0.0) so it is reachable only through nginx.
}

# --- TLS (strongly recommended for a public host) ---------------------------------
# Get a free certificate with certbot (`certbot --nginx -d benchapp.example.com`),
# which rewrites the block above to listen on 443 and adds a 301 from 80 -> 443.
# Then uncomment the Strict-Transport-Security header above.
